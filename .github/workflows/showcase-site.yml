name: Showcase site

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build and upload site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Install site dependencies
        run: |
          set -euo pipefail
          cd site
          bun install --frozen-lockfile

      - name: Build site
        env:
          ASTRO_TELEMETRY_DISABLED: "1"
        run: |
          set -euo pipefail
          cd site
          bun run build

      - name: Verify Pages output
        run: |
          set -euo pipefail
          if [[ ! -f site/dist/index.html ]]; then
            echo "::error::Astro build did not produce site/dist/index.html"
            exit 1
          fi
          if [[ -z "$(find site/dist -type f -print -quit)" ]]; then
            echo "::error::Astro build produced an empty site/dist directory"
            exit 1
          fi
          du -sh site/dist

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/dist

  deploy:
    name: Deploy site
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Verify deployment output
        if: ${{ always() }}
        env:
          DEPLOYMENT_OUTCOME: ${{ steps.deployment.outcome }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          if [[ "$DEPLOYMENT_OUTCOME" != "success" ]]; then
            echo "::error::GitHub Pages deployment finished with outcome: $DEPLOYMENT_OUTCOME"
            exit 1
          fi
          if [[ -z "$PAGE_URL" ]]; then
            echo "::error::GitHub Pages deployment did not return page_url"
            exit 1
          fi
          echo "Published to [$PAGE_URL]($PAGE_URL)" >> "$GITHUB_STEP_SUMMARY"
