name: Release artifacts

# release-please and the native release build stay in one run because a Release
# created with github.token does not trigger a separate workflow.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing GitHub Release tag to rebuild and attach
        required: true
        type: string

permissions:
  contents: write

jobs:
  release_please:
    name: Cut or select the release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created || steps.fallback.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name || steps.fallback.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        if: github.event_name == 'push'
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Guard manual fallback
        id: fallback
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::tag_name must be a stable release tag such as v1.2.3"
            exit 1
          fi

          gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null
          mapfile -t existing_assets < <(
            gh release view "$TAG_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --json assets \
              --jq '.assets[].name'
          )
          expected_assets=(
            kitten-darwin-arm64
            kitten-darwin-x64
            kitten-linux-x64
            kitten-linux-arm64
            SHA256SUMS
          )

          for asset in "${expected_assets[@]}"; do
            if printf '%s\n' "${existing_assets[@]}" | grep -Fqx "$asset"; then
              echo "::error::$TAG_NAME already contains $asset; refusing to attach release assets twice"
              exit 1
            fi
          done

          echo "release_created=true" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.platform }}
    needs: release_please
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-15
          - platform: darwin-x64
            runner: macos-15-intel
          - platform: linux-x64
            runner: ubuntu-latest
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release_please.outputs.tag_name }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile

      - name: Compile ${{ matrix.platform }} on its native runner
        run: bun run scripts/build.ts ${{ matrix.platform }}

      - name: Self-check the artifact
        run: |
          chmod +x dist/kitten-${{ matrix.platform }}
          ./dist/kitten-${{ matrix.platform }} --self-check

      - name: Per-target checksum
        run: |
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "kitten-${{ matrix.platform }}" > "kitten-${{ matrix.platform }}.sha256"
          else
            shasum -a 256 "kitten-${{ matrix.platform }}" > "kitten-${{ matrix.platform }}.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: kitten-${{ matrix.platform }}
          path: dist/kitten-${{ matrix.platform }}*

  attach:
    name: Attach binaries and SHA256SUMS
    needs: [release_please, build]
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: staging

      - name: Assemble the release assets
        shell: bash
        run: |
          set -euo pipefail
          expected_binaries=(
            kitten-darwin-arm64
            kitten-darwin-x64
            kitten-linux-x64
            kitten-linux-arm64
          )
          mkdir -p dist

          for binary in "${expected_binaries[@]}"; do
            source_path="$(find staging -type f -name "$binary" -print -quit)"
            if [[ -z "$source_path" ]]; then
              echo "::error::missing build artifact $binary"
              exit 1
            fi
            cp "$source_path" "dist/$binary"
          done

          cd dist
          sha256sum kitten-* > SHA256SUMS
          cat SHA256SUMS

      - name: Upload assets to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.release_please.outputs.tag_name }}
        run: gh release upload "$TAG_NAME" dist/kitten-* dist/SHA256SUMS --repo "$GITHUB_REPOSITORY"
