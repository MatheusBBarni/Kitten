name: Release artifacts

# Compiled standalone binaries per platform (ADR-006). Each platform is built AND
# self-checked on a native runner, so OpenTUI's native (Zig) core is validated on the
# real target - the ADR-006 cross-platform FFI risk - before anything is published.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-14
          - platform: darwin-x64
            runner: macos-13
          - platform: linux-x64
            runner: ubuntu-latest
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile

      - name: Compile ${{ matrix.platform }} (native runner, real FFI)
        run: bun run scripts/build.ts ${{ matrix.platform }}

      - name: Self-check the artifact
        run: |
          chmod +x dist/kitten-${{ matrix.platform }}
          ./dist/kitten-${{ matrix.platform }} --self-check

      - name: Per-target checksum
        run: |
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "kitten-${{ matrix.platform }}" > "kitten-${{ matrix.platform }}.sha256"
          else
            shasum -a 256 "kitten-${{ matrix.platform }}" > "kitten-${{ matrix.platform }}.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: kitten-${{ matrix.platform }}
          path: dist/kitten-${{ matrix.platform }}*

  publish-binaries:
    name: Attach binaries + SHA256SUMS to the release
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: staging
      - name: Assemble dist and SHA256SUMS
        run: |
          mkdir -p dist
          find staging -type f -name 'kitten-*' ! -name '*.sha256' -exec cp {} dist/ \;
          cd dist
          sha256sum kitten-* > SHA256SUMS
          cat SHA256SUMS
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/kitten-* dist/SHA256SUMS --repo "${{ github.repository }}"

  publish-npm:
    name: Publish npm package (bunx kitten)
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      # The release tag is the source of truth for the version. package.json ships 0.0.0,
      # so without this every release would try to publish 0.0.0 - a version/tag mismatch
      # on the first release and a hard 403 (cannot republish a version) on every one
      # after. Stamp the tag in before publishing so npm gets a matching, monotonic version.
      - name: Stamp version from release tag
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: npm version "${TAG#v}" --no-git-tag-version --allow-same-version
      - name: Publish
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --access public
