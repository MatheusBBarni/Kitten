name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Typecheck, test, coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Resolve README install channel
        run: bun run packages/tui/scripts/check-readme-install.ts README.md
      - run: bun install --frozen-lockfile
      - name: Install showcase dependencies
        working-directory: site
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run --filter @matheusbbarni/kitten typecheck
      - name: Typecheck desktop dependencies
        run: bun run --filter @kitten/engine typecheck && bun run --filter @kitten/desktop typecheck
      - name: Desktop layered acceptance
        run: bun run test:desktop-acceptance
      - name: Desktop test coverage
        run: bun run --filter @kitten/desktop test:coverage
      - name: Test with coverage
        run: bun run --filter @matheusbbarni/kitten test:coverage
      - name: Relocated Cockpit compatibility
        run: bun run verify:cockpit
