<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kitten Orchestrator</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
        line-height: 1.5;
        --color-bg: #f8fafc;
        --color-surface: #ffffff;
        --color-surface-subtle: #f1f5f9;
        --color-border: #cbd5e1;
        --color-text: #0f172a;
        --color-text-secondary: #475569;
        --color-action: #1d4ed8;
        --color-action-hover: #1e40af;
        --color-action-text: #ffffff;
        --color-focus: #2563eb;
        --color-warning-bg: #fffbeb;
        --color-warning-border: #b45309;
        --color-warning-text: #78350f;
        --color-danger-bg: #fef2f2;
        --color-danger-border: #b91c1c;
        --color-danger-text: #7f1d1d;
        --color-attention-bg: #fff7ed;
        --color-attention-border: #c2410c;
        --color-disabled-bg: #e2e8f0;
        --color-disabled-border: #94a3b8;
        --color-disabled-text: #475569;
        --color-backdrop: rgb(15 23 42 / 0.68);
        --space-1: 0.25rem;
        --space-2: 0.5rem;
        --space-3: 0.75rem;
        --space-4: 1rem;
        --space-6: 1.5rem;
        --space-8: 2rem;
        --radius-sm: 0.25rem;
        --radius-md: 0.5rem;
        --radius-lg: 0.75rem;
        --duration-fast: 120ms;
      }
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme]) {
          --color-bg: #0f172a;
          --color-surface: #172033;
          --color-surface-subtle: #1e293b;
          --color-border: #475569;
          --color-text: #f8fafc;
          --color-text-secondary: #cbd5e1;
          --color-action: #60a5fa;
          --color-action-hover: #93c5fd;
          --color-action-text: #0f172a;
          --color-focus: #93c5fd;
          --color-warning-bg: #422006;
          --color-warning-border: #f59e0b;
          --color-warning-text: #fef3c7;
          --color-danger-bg: #450a0a;
          --color-danger-border: #f87171;
          --color-danger-text: #fee2e2;
          --color-attention-bg: #431407;
          --color-attention-border: #fb923c;
          --color-disabled-bg: #334155;
          --color-disabled-border: #64748b;
          --color-disabled-text: #cbd5e1;
        }
        body { line-height: 1.55; letter-spacing: 0.005em; }
      }
      :root[data-theme="dark"] {
        color-scheme: dark;
        --color-bg: #0f172a;
        --color-surface: #172033;
        --color-surface-subtle: #1e293b;
        --color-border: #475569;
        --color-text: #f8fafc;
        --color-text-secondary: #cbd5e1;
        --color-action: #60a5fa;
        --color-action-hover: #93c5fd;
        --color-action-text: #0f172a;
        --color-focus: #93c5fd;
        --color-warning-bg: #422006;
        --color-warning-border: #f59e0b;
        --color-warning-text: #fef3c7;
        --color-danger-bg: #450a0a;
        --color-danger-border: #f87171;
        --color-danger-text: #fee2e2;
        --color-attention-bg: #431407;
        --color-attention-border: #fb923c;
        --color-disabled-bg: #334155;
        --color-disabled-border: #64748b;
        --color-disabled-text: #cbd5e1;
      }
      :root[data-theme="light"] { color-scheme: light; }
      * { box-sizing: border-box; }
      body { margin: 0; min-width: 20rem; min-height: 100vh; background: var(--color-bg); color: var(--color-text); }
      button, input, select, textarea { font: inherit; }
      button, input, select { min-height: 2.75rem; }
      button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, summary:focus-visible, [tabindex]:focus-visible {
        outline: 0.1875rem solid var(--color-focus);
        outline-offset: 0.125rem;
      }
      button { cursor: pointer; }
      button:disabled, input:disabled, select:disabled, textarea:disabled {
        cursor: not-allowed;
        border-color: var(--color-disabled-border);
        background: var(--color-disabled-bg);
        color: var(--color-disabled-text);
        opacity: 1;
      }
      h1, h2, h3, p { margin-top: 0; }
      h1, h2, h3 { line-height: 1.3; }
      .app-shell { min-height: 100vh; padding: var(--space-6); }
      .app-header, .canvas-header, .dialog-header, .stage-header {
        display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-4);
      }
      .app-header { margin-bottom: var(--space-6); }
      .eyebrow, .stage-position, .revision {
        color: var(--color-text-secondary); font-size: 0.8125rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      }
      .revision { font-variant-numeric: tabular-nums; }
      .button {
        min-height: 2.75rem; border: 0.0625rem solid transparent; border-radius: var(--radius-md);
        padding: var(--space-2) var(--space-3); font-weight: 700;
        transition: background-color var(--duration-fast), border-color var(--duration-fast);
      }
      .button-primary { background: var(--color-action); color: var(--color-action-text); }
      .button-primary:hover:not(:disabled) { background: var(--color-action-hover); }
      .button:active:not(:disabled) { border-color: var(--color-focus); }
      .button-secondary { background: var(--color-surface); border-color: var(--color-border); color: var(--color-text); }
      .button-secondary:hover:not(:disabled), .button-ghost:hover:not(:disabled) { background: var(--color-surface-subtle); }
      .button-ghost { background: transparent; color: var(--color-text); }
      .button-attention { background: var(--color-attention-bg); border-color: var(--color-attention-border); color: var(--color-text); }
      .notice { border: 0.0625rem solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-3); background: var(--color-surface-subtle); }
      .notice-warning { border-color: var(--color-warning-border); background: var(--color-warning-bg); color: var(--color-warning-text); }
      .notice-error { border-color: var(--color-danger-border); background: var(--color-danger-bg); color: var(--color-danger-text); }
      .blank-board { max-width: 52rem; margin: 8vh auto 0; padding: var(--space-8); background: var(--color-surface); border: 0.0625rem solid var(--color-border); border-radius: var(--radius-lg); }
      .setup-choice, .board-shortcuts, .canvas-actions, .reorder-controls, .dialog-actions { display: flex; flex-wrap: wrap; gap: var(--space-2); }
      .setup-choice { margin: var(--space-6) 0; }
      .setup-form { display: grid; gap: var(--space-6); margin-top: var(--space-6); }
      .field { display: grid; gap: var(--space-2); font-weight: 700; }
      .field small { color: var(--color-text-secondary); font-weight: 400; }
      input, select, textarea { width: 100%; border: 0.0625rem solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-2) var(--space-3); background: var(--color-surface); color: var(--color-text); }
      textarea { resize: vertical; }
      fieldset { border: 0.0625rem solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-4); }
      legend { font-weight: 700; padding: 0 var(--space-2); }
      .starter-stages { display: grid; gap: var(--space-2); padding-left: var(--space-6); }
      .board-shortcuts { align-items: center; margin-bottom: var(--space-4); }
      .board-canvas { background: var(--color-surface); border: 0.0625rem solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-4); overflow: hidden; }
      .board-workspace { display: grid; gap: var(--space-4); min-width: 0; }
      .board-workspace.has-inspector { grid-template-columns: minmax(0, 1fr) minmax(24rem, 34rem); align-items: start; }
      .repository-path { max-width: 70ch; overflow-wrap: anywhere; color: var(--color-text-secondary); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      .path-status, .stage-configured { color: var(--color-text-secondary); font-weight: 700; }
      .canvas-help { color: var(--color-text-secondary); }
      .stage-list { display: flex; align-items: flex-start; gap: var(--space-4); margin: 0; padding: var(--space-2); overflow-x: auto; list-style: none; }
      .stage-column { flex: 0 0 19rem; display: grid; gap: var(--space-3); border: 0.0625rem solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-3); background: var(--color-surface-subtle); }
      .stage-column[draggable="true"] { cursor: grab; }
      .stage-header { align-items: center; }
      .stage-header h3 { margin-bottom: 0; }
      .reorder-controls { justify-content: flex-end; }
      .reorder-controls .button { font-size: 0.75rem; padding: var(--space-1) var(--space-2); }
      .card-list { display: grid; gap: var(--space-3); margin: 0; padding: 0; list-style: none; }
      .workflow-card { display: grid; gap: var(--space-2); border: 0.0625rem solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-3); background: var(--color-surface); }
      .workflow-card.is-selected { border-width: 0.1875rem; }
      .workflow-card.needs-attention { border-color: var(--color-attention-border); background: var(--color-attention-bg); }
      .attention-label { margin-bottom: 0; }
      .card-title-button { min-height: 2.75rem; border: 0; padding: 0; background: transparent; color: var(--color-text); font-weight: 700; text-align: left; }
      .card-facts { display: grid; gap: var(--space-2); margin: 0; }
      .card-facts div { display: grid; grid-template-columns: 7rem minmax(0, 1fr); gap: var(--space-2); }
      .card-facts dt { color: var(--color-text-secondary); font-size: 0.8125rem; font-weight: 700; }
      .card-facts dd { margin: 0; overflow-wrap: anywhere; }
      .stage-lock { border: 0.0625rem solid var(--color-warning-border); border-radius: var(--radius-sm); padding: var(--space-2); background: var(--color-warning-bg); color: var(--color-warning-text); }
      .stage-arrow { margin: 0; font-weight: 700; text-align: right; }
      .inspector-route { margin-top: var(--space-4); border: 0.0625rem solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-3); background: var(--color-surface); }
      .card-inspector { position: sticky; top: var(--space-4); display: grid; gap: var(--space-4); max-height: calc(100vh - 2rem); min-width: 0; border: 0.0625rem solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-4); background: var(--color-surface); }
      .inspector-header { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-4); }
      .inspector-header h2, .attempt-timeline h3, .persistent-composer h3, .attention-blocker h3 { margin-bottom: 0; }
      .inspector-status, .run-context-facts { display: grid; gap: var(--space-2); margin: 0; }
      .inspector-status div, .run-context-facts div { display: grid; grid-template-columns: minmax(7rem, auto) minmax(0, 1fr); gap: var(--space-2); }
      .inspector-status dt, .run-context-facts dt { color: var(--color-text-secondary); font-size: 0.8125rem; font-weight: 700; }
      .inspector-status dd, .run-context-facts dd { margin: 0; overflow-wrap: anywhere; }
      .inspector-history-scroll { min-height: 10rem; overflow-y: auto; overscroll-behavior: contain; }
      .attempt-list, .timeline-events, .follow-up-queue ol { display: grid; gap: var(--space-3); margin: 0; padding: 0; list-style: none; }
      .attempt-transcript { border: 0.0625rem solid var(--color-border); border-radius: var(--radius-md); background: var(--color-surface-subtle); }
      .attempt-transcript > summary { display: flex; justify-content: space-between; gap: var(--space-3); min-height: 2.75rem; padding: var(--space-3); cursor: pointer; font-weight: 700; }
      .attempt-transcript > section, .attempt-transcript > p, .attempt-transcript > ol { margin: 0 var(--space-3) var(--space-3); }
      .run-context { border-top: 0.0625rem solid var(--color-border); padding-top: var(--space-3); }
      .run-context h4, .follow-up-queue h4 { margin: 0 0 var(--space-3); }
      .timeline-event { display: grid; grid-template-columns: 8rem minmax(0, 1fr); gap: var(--space-3); border-top: 0.0625rem solid var(--color-border); padding-top: var(--space-3); }
      .timeline-event time, .event-state, .composer-help { color: var(--color-text-secondary); font-size: 0.8125rem; }
      .timeline-event p, .queued-follow-up p { margin-bottom: var(--space-2); }
      .transcript-text { white-space: pre-wrap; overflow-wrap: anywhere; }
      .persistent-composer { display: grid; gap: var(--space-3); border-top: 0.0625rem solid var(--color-border); padding-top: var(--space-4); }
      .persistent-composer form, .attention-blocker form { display: grid; gap: var(--space-3); }
      .queued-follow-up { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: var(--space-3); border: 0.0625rem solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-3); }
      .queue-actions, .attention-actions { display: flex; flex-wrap: wrap; align-items: flex-start; justify-content: flex-end; gap: var(--space-2); }
      .attention-blocker { border: 0.125rem solid var(--color-attention-border); border-radius: var(--radius-md); padding: var(--space-4); background: var(--color-attention-bg); }
      .attention-options { display: grid; gap: var(--space-2); }
      .attention-option { display: grid; grid-template-columns: 1.5rem minmax(0, 1fr); gap: var(--space-2); align-items: start; min-height: 2.75rem; }
      .attention-option input { width: 1.25rem; min-height: 1.25rem; margin-top: var(--space-1); }
      .attention-option small { display: block; color: var(--color-text-secondary); }
      .stage-dialog { width: min(42rem, calc(100vw - 2rem)); max-height: calc(100vh - 2rem); overflow: auto; border: 0.0625rem solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-6); background: var(--color-surface); color: var(--color-text); }
      .stage-dialog::backdrop { background: var(--color-backdrop); }
      .stage-dialog form { display: grid; gap: var(--space-4); }
      .dialog-actions { justify-content: flex-end; }
      .catalog-diagnostics { border: 0.0625rem solid var(--color-warning-border); border-radius: var(--radius-md); padding: var(--space-3); background: var(--color-warning-bg); color: var(--color-warning-text); }
      .catalog-diagnostics li + li { margin-top: var(--space-2); }
      .app-route-nav { display: flex; justify-content: flex-end; gap: var(--space-2); padding: var(--space-3) var(--space-6) 0; }
      .app-route-nav [aria-current="page"] { border-color: var(--color-action); background: var(--color-surface); }
      .settings-shell { display: grid; gap: var(--space-6); max-width: 72rem; min-height: auto; margin: 0 auto; }
      .settings-shell > .app-header { margin-bottom: 0; }
      .settings-panel { display: grid; gap: var(--space-4); border: 0.0625rem solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-6); background: var(--color-surface); }
      .settings-panel h2, .settings-panel h3, .settings-panel p { margin-bottom: 0; }
      .settings-form { display: grid; gap: var(--space-4); max-width: 48rem; }
      .settings-form .button { justify-self: start; }
      .profile-readiness-list, .diagnostic-list { display: grid; gap: var(--space-2); margin: 0; padding-left: var(--space-6); }
      .catalog-diagnostics-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: var(--space-6); }
      .catalog-diagnostics-grid ul { overflow-wrap: anywhere; }
      .field-error { color: var(--color-danger-text); font-weight: 700; }
      .sr-only { position: absolute; width: 0.0625rem; height: 0.0625rem; padding: 0; margin: -0.0625rem; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
      @media (max-width: 48rem) {
        .app-shell { padding: var(--space-4); }
        .app-header, .canvas-header, .dialog-header, .stage-header { align-items: stretch; flex-direction: column; }
        .stage-column { flex-basis: min(19rem, calc(100vw - 4rem)); }
        .board-workspace.has-inspector { grid-template-columns: minmax(0, 1fr); }
        .card-inspector { position: static; max-height: none; }
        .inspector-header, .queued-follow-up, .timeline-event { grid-template-columns: minmax(0, 1fr); flex-direction: column; }
        .app-route-nav { padding-inline: var(--space-4); }
        .catalog-diagnostics-grid { grid-template-columns: minmax(0, 1fr); }
      }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { scroll-behavior: auto !important; transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
